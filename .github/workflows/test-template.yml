name: Test py-template

on:
  push:
    branches:
      - main
  pull_request:

env:
  PROJECT_NAME: test-project

jobs:
  test-template:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        copier_version: ["9.7.0", "latest"]
        remote_url: ["", "https://github.com/grok-ai/dummy-repo.git"]
        use_precommit: [true, false]
        env_init: [true, false]
        exclude:
          # Skip remote URL tests with env_init=false (can't push without deps)
          - remote_url: "https://github.com/grok-ai/dummy-repo.git"
            env_init: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies (UV)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin:$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Configure Git for Test Repo
        run: |
          git config --global init.defaultBranch main
          git config --global user.name "GitHubActions"
          git config --global user.email "github-actions@users.noreply.github.com"

      - name: Generate Project
        run: |
          if [ "${{ matrix.copier_version }}" = "latest" ]; then
            COPIER_CMD="uvx copier"
          else
            COPIER_CMD="uvx --from copier==${{ matrix.copier_version }} copier"
          fi
          $COPIER_CMD copy --trust --force . ${{ env.PROJECT_NAME }} \
            -d project_name=testpkg \
            -d "description=A test project" \
            -d use_precommit=${{ matrix.use_precommit }} \
            -d env_init=${{ matrix.env_init }} \
            -d "remote_url=${{ matrix.remote_url }}" \
            -d push_to_remote=false \
            -d "extra_dependencies=[]" \
            -d license=MIT

      - name: Check Git Initialization
        working-directory: ${{ env.PROJECT_NAME }}
        run: |
          if [ -d ".git" ]; then echo "Git initialized"; else echo "Git not initialized" && exit 1; fi

      - name: Ensure Pre-Commit is Installed (if enabled)
        if: matrix.use_precommit && matrix.env_init
        working-directory: ${{ env.PROJECT_NAME }}
        run: |
          uv run pre-commit --version

      - name: Check Dependencies Installation (if env_init=true)
        if: matrix.env_init
        working-directory: ${{ env.PROJECT_NAME }}
        run: |
          uv sync
          uv pip list | grep rich || { echo "Dependency installation failed"; exit 1; }

      - name: Run Tests (if env_init=true)
        if: matrix.env_init
        working-directory: ${{ env.PROJECT_NAME }}
        run: |
          if [ -d "tests" ]; then
            echo "Running pytest on generated project..."
            uv run pytest tests -v || { echo "Tests failed"; exit 1; }
          else
            echo "No tests found in tests"
            exit 1
          fi

      - name: Check Remote Configuration
        if: matrix.remote_url != ''
        working-directory: ${{ env.PROJECT_NAME }}
        run: |
          REMOTE=$(git remote get-url origin 2>/dev/null || echo "")
          if [ "$REMOTE" = "${{ matrix.remote_url }}" ]; then
            echo "Remote configured correctly: $REMOTE"
          else
            echo "Remote configuration failed. Expected: ${{ matrix.remote_url }}, Got: $REMOTE"
            exit 1
          fi
