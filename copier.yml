_min_copier_version: "9.7.0"
_templates_suffix: ".tmpl"
_exclude:
  - .git
  - copier.yml
  - setup.sh
  - .github
  - template_tests
  - scripts
  - docs

# =============================================================================
# Group 1: Essential Project Information
# =============================================================================

project_name:
  type: str
  help: "Project name (can have hyphens/spaces)"
  default: "{{ _copier_conf.dst_path | basename }}"

description:
  type: str
  help: "Short description of your project"
  default: "A Python project generated with grok-ai/py-template."

# =============================================================================
# Group 2: Development Setup
# =============================================================================

use_precommit:
  type: bool
  help: "Enable pre-commit hooks for code quality?"
  default: true

env_init:
  type: bool
  help: "Initialize virtual environment and install dependencies?"
  default: true

python_version:
  type: str
  help: "Minimum Python version"
  default: ">=3.9"

# =============================================================================
# Group 3: Remote Configuration (Simplified)
# =============================================================================

remote_url:
  type: str
  help: "Git remote URL (leave empty to skip remote setup)"
  default: ""

push_to_remote:
  type: bool
  help: "Push to remote after initialization?"
  when: "{{ remote_url != '' }}"
  default: false

# =============================================================================
# Group 4: Advanced Options
# =============================================================================

extra_dependencies:
  type: yaml
  help: "Additional dependencies beyond core (rich, python-dotenv, GitPython)"
  default: []

maintainers:
  type: yaml
  help: "Project maintainers (list with name and optional email)"
  default:
    - { name: "Your Name", email: "your.email@example.com" }

license:
  type: str
  help: "Project license"
  default: "MIT"
  choices:
    - "MIT"
    - "Apache-2.0"

# =============================================================================
# Computed Variables (not shown to user)
# =============================================================================

# Package name computed from project_name (always valid Python identifier)
package_name:
  type: str
  when: false
  default: "{{ project_name | lower | replace(' ', '_') | replace('-', '_') }}"

# Core dependencies that are always included
core_dependencies:
  type: yaml
  when: false
  default:
    - rich
    - python-dotenv
    - GitPython

# Combined dependencies list
dependencies:
  type: yaml
  when: false
  default: "{{ core_dependencies + (['pre-commit'] if use_precommit else []) + extra_dependencies }}"

# =============================================================================
# Post-Generation Tasks
# =============================================================================

_tasks:
  - "{% if env_init %}echo '[1/4] Installing dependencies...' && uv sync{% endif %}"
  - "echo '[2/4] Initializing Git repository...' && git init"
  - "{% if use_precommit and env_init %}echo '[3/4] Installing pre-commit hooks...' && uv run pre-commit install{% else %}echo '[3/4] Skipping pre-commit{% if not env_init %} (no env){% elif not use_precommit %} (disabled){% endif %}'{% endif %}"
  - "echo '[4/4] Creating initial commit...' && git add . && git commit -m 'Project initialization with https://github.com/grok-ai/py-template' --no-verify"
  - "{% if remote_url %}echo 'Configuring remote...' && git remote add origin {{ remote_url }}{% if push_to_remote %} && git push -u origin main{% endif %}{% else %}echo 'Skipping remote setup'{% endif %}"
